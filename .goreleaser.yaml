version: 2

project_name: netmap

builds:
  - main: .
    binary: netmap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: bhancock4
      name: homebrew-tap
    homepage: "https://github.com/bhancock4/netmap"
    description: "Network topology mapper with a rich terminal UI"
    license: "MIT"
    install: |
      bin.install "netmap"
